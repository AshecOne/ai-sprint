<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- dark water background -->
  <rect width="16" height="16" fill="#07101a"/>
  <!-- dorsal fin -->
  <rect x="5" y="3" width="2" height="1" fill="#0891b2"/>
  <rect x="5" y="4" width="5" height="2" fill="#0891b2"/>
  <!-- tail upper fork -->
  <rect x="13" y="4" width="1" height="1" fill="#22d3ee"/>
  <rect x="12" y="5" width="2" height="2" fill="#0891b2"/>
  <!-- tail neck -->
  <rect x="11" y="7" width="2" height="2" fill="#0891b2"/>
  <!-- tail lower fork -->
  <rect x="12" y="9" width="2" height="2" fill="#0891b2"/>
  <rect x="13" y="11" width="1" height="1" fill="#22d3ee"/>
  <!-- main body -->
  <rect x="2" y="6" width="10" height="5" fill="#22d3ee"/>
  <!-- belly shimmer -->
  <rect x="4" y="9" width="5" height="1" fill="#67e8f9"/>
  <!-- scale highlight -->
  <rect x="7" y="7" width="2" height="1" fill="#67e8f9"/>
  <!-- head nose -->
  <rect x="1" y="7" width="1" height="2" fill="#22d3ee"/>
  <!-- pectoral fin -->
  <rect x="6" y="10" width="3" height="1" fill="#0891b2"/>
  <!-- eye pupil -->
  <rect x="4" y="7" width="1" height="1" fill="#07101a"/>
  <!-- eye shine -->
  <rect x="4" y="6" width="1" height="1" fill="#bae6fd"/>
</svg>
